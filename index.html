<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOCA MASTER - 2차 수행평가</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg: #0F172A;
            --card: rgba(30, 41, 59, 0.9);
            --point: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
            --text: #F8FAFC;
            --dim: #94A3B8;
        }
        @font-face { font-family: 'KonKon'; src: url('온글잎 콘콘체.ttf'); }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', 'KonKon', sans-serif; }
        body { background-color: var(--bg); color: var(--text); min-height: 100dvh; display: flex; justify-content: center; align-items: flex-start; background-image: radial-gradient(circle at top right, #1E1B4B, transparent); overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; padding: 20px; margin: auto; }
        .screen { display: none; animation: fadeIn 0.3s ease-out; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 카드 UI */
        .card-container { perspective: 1000px; width: 100%; height: 320px; margin: 20px 0; }
        .card { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; border-radius: 32px; background: var(--card); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; }
        .card-back { transform: rotateY(180deg); border: 1px solid rgba(168, 85, 247, 0.5); background: linear-gradient(135deg, rgba(99, 102, 241, 0.05), rgba(168, 85, 247, 0.12)); }
        
        .word { font-family: 'KonKon'; font-size: 2.8rem; font-weight: 800; }
        .mean { font-family: 'KonKon'; font-size: 1.7rem; color: #A855F7; }

        /* 버튼 및 입력창 */
        .btn { width: 100%; padding: 18px; border-radius: 20px; border: none; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-primary { background: var(--point); color: white; }
        .btn-pdf { background: #059669; color: white; font-size: 0.95rem; }
        .btn-outline { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        .input-ui { width: 100%; padding: 16px; border-radius: 18px; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.1); color: white; text-align: center; font-size: 1.1rem; outline: none; }
        
        /* 전체 보기 리스트 스타일 */
        .voca-list-item { background: rgba(255,255,255,0.03); padding: 15px 20px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .voca-list-item .w { font-family: 'KonKon'; font-size: 1.2rem; font-weight: bold; color: #6366F1; }
        .voca-list-item .m { font-family: 'KonKon'; font-size: 1rem; color: var(--dim); text-align: right; max-width: 60%; }

        .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .progress-fill { height: 100%; background: var(--point); width: 0%; transition: 0.5s; }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen" class="screen active">
        <div style="text-align: center; margin-bottom: 25px;">
            <h1 style="font-family: 'KonKon'; font-size: 2.8rem; background: var(--point); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">VOCA MASTER</h1>
            <p style="color: var(--dim);">포항고 2차 수행평가 (130 Words)</p>
        </div>
        
        <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.06); margin-bottom: 15px;">
            <p style="text-align: center; font-size: 0.9rem; color: var(--dim); margin-bottom: 10px;">누적 학습/PDF 범위 (Part 1 ~ 13)</p>
            <input type="number" id="target-part" value="1" min="1" max="13" class="input-ui" style="margin-bottom: 15px;">
            <button class="btn btn-pdf" onclick="downloadTestPaper()">📝 단어 시험지(PDF) 다운로드</button>
            <button class="btn btn-primary" onclick="startStrategy()">전략적 누적 학습 시작</button>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn btn-outline" onclick="initMode('study')">순차 암기</button>
            <button class="btn btn-outline" onclick="initMode('test')">랜덤 테스트</button>
        </div>
        <button class="btn btn-outline" style="border-color: #6366F1; color: #6366F1;" onclick="openListView()">📖 전체 단어 보기 / 검색</button>
    </div>

    <div id="list-screen" class="screen">
        <h2 style="font-family: 'KonKon'; font-size: 1.8rem; margin-bottom: 15px; text-align: center;">전체 단어장</h2>
        <input type="text" id="search-input" class="input-ui" placeholder="단어 또는 뜻 검색..." oninput="filterList()" style="margin-bottom: 20px;">
        <div id="voca-list-container" style="max-height: 60vh; overflow-y: auto; padding-right: 5px;"></div>
        <button class="btn btn-primary" onclick="location.reload()" style="margin-top: 20px;">홈으로 돌아가기</button>
    </div>

    <div id="action-screen" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span id="mode-label" style="font-size: 0.9rem; color: #A855F7; font-weight: 800;">학습 중</span>
            <span style="font-size: 0.9rem; color: var(--dim);"><span id="cur-idx">1</span> / <span id="total-idx">130</span></span>
        </div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>

        <div id="card-area" class="card-container" onclick="flipCard()">
            <div id="main-card" class="card">
                <div class="card-face"><div id="front-w" class="word"></div></div>
                <div class="card-face card-back"><div id="back-m" class="mean"></div></div>
            </div>
        </div>

        <div id="test-area" style="display: none; text-align: center; margin: 30px 0;">
            <div id="test-w" class="word" style="margin-bottom: 25px;"></div>
            <input type="text" id="user-input" class="input-ui" placeholder="뜻을 입력하세요" autocomplete="off" onkeypress="if(event.key==='Enter') handleNext()">
            <div id="test-ans" class="mean" style="margin-top: 25px; opacity: 0; transition: 0.3s;"></div>
        </div>

        <div id="study-controls" style="display: none; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn" style="background: rgba(239, 68, 68, 0.15); color: #F87171;" onclick="nextWord()">모름 ❌</button>
            <button class="btn" style="background: rgba(16, 185, 129, 0.15); color: #34D399;" onclick="nextWord()">알겠음 ✅</button>
        </div>
        
        <button id="action-btn" class="btn btn-primary" onclick="handleNext()">뜻 확인하기</button>
        <button class="btn" style="background: none; color: var(--dim);" onclick="location.reload()">학습 종료</button>
    </div>
</div>

<script>
    const vocab = [
        {w:"absorb", m:"흡수하다"}, {w:"accessible", m:"접근(이용)가능한"}, {w:"acquaintance", m:"지인, 아는 사람"}, {w:"acquire", m:"습득하다, 얻다"}, {w:"address", m:"다루다, 해결하다; 연설하다; 주소"},
        {w:"adverse", m:"부정적인, 반대의; 불리한"}, {w:"alternative", m:"대안, 대체(품); 대신하는"}, {w:"approach", m:"접근(법); 다가가다, 접근하다"}, {w:"apt", m:"적절한; (~하는) 경향이 있는"}, {w:"arise", m:"발생하다, 생기다, 일어나다(from)"},
        {w:"assumption", m:"가정, 가설, 추측, 전제"}, {w:"attribute", m:"속성, 특성, 자질; ~의 결과로 보다(to)"}, {w:"bonding", m:"결합, 접합, 유착"}, {w:"boundary", m:"경계, 한계(선)"}, {w:"bully", m:"괴롭히다; 따돌림, 폭력, 가해"},
        {w:"commerce", m:"상업, 무역"}, {w:"comprehensive", m:"종합적인, 포괄적인"}, {w:"comprise", m:"이루다, 구성하다; 포함하다"}, {w:"conform", m:"따르다, 일치하다, 순응하다(to)"}, {w:"constitute", m:"구성하다; 제정하다"},
        {w:"constraint", m:"제약(조건), 제한"}, {w:"critical", m:"중대한, 결정적인; 비판적인"}, {w:"decode", m:"해독하다, 해석하다"}, {w:"define", m:"정의하다, 규정하다"}, {w:"degradation", m:"악화, 저하"},
        {w:"depress", m:"침체시키다, 하락시키다; 우울하게 하다"}, {w:"designation", m:"지정, 지명; 명칭, 직함"}, {w:"destination", m:"목적지, 도착지"}, {w:"differentiated", m:"차별화된"}, {w:"diminish", m:"줄어들다, 약해지다"},
        {w:"diplomatic", m:"외교의, 외교적인"}, {w:"disposal", m:"처리, 처분"}, {w:"disrupt", m:"방해하다, 교란하다"}, {w:"distinguish", m:"구별하다"}, {w:"division", m:"분할, 분리; 분열; 구분"},
        {w:"durable", m:"오래 지속되는, 내구력 있는"}, {w:"efficient", m:"효율적인"}, {w:"embed", m:"내포하다, 내장하다, 심다, (깊이) 새기다"}, {w:"employee", m:"직원, 고용인"}, {w:"engage", m:"관여하다, 고용하다, 약속하다"},
        {w:"erode", m:"침식시키다, 약화시키다"}, {w:"establish", m:"설립하다, 수립하다, 확립하다"}, {w:"estimate", m:"추정하다; 추정(치)"}, {w:"existence", m:"생활, 삶; 존재, 현존"}, {w:"exploit", m:"착취하다, 이용하다"},
        {w:"expose", m:"접하게 하다, 노출시키다; 드러내다"}, {w:"figure out", m:"생각해내다, 이해하다"}, {w:"finance", m:"재정, 자금, 금융"}, {w:"flourish", m:"번성하다, 번창하다"}, {w:"formalize", m:"형식을 갖추다, 공식화하다"},
        {w:"foundation", m:"토대, 기초, 기반; 재단, 설립"}, {w:"fraction", m:"소량, 파편; 분수"}, {w:"geographic", m:"지리(학)적인, 지리(학)의"}, {w:"glacier", m:"빙하"}, {w:"habitat", m:"서식지"},
        {w:"heighten", m:"높이다, 강화하다, 고조시키다"}, {w:"hypothetical", m:"가설의, 가상의"}, {w:"identity", m:"정체성; 신원"}, {w:"immediate", m:"즉각적인, 즉시의"}, {w:"immense", m:"막대한, 거대한"},
        {w:"immerse", m:"(액체 등에) 담그다; 몰두하게 하다"}, {w:"implement", m:"시행하다, 실시하다; 도구, 방법"}, {w:"implication", m:"영향, 결과; 의미"}, {w:"impulse", m:"충동; 자극"}, {w:"independent", m:"독립한"},
        {w:"inevitable", m:"불가피한, 필연적인"}, {w:"inform", m:"알리다, 정보를 제공하다"}, {w:"informal", m:"비공식적인, 일상적인"}, {w:"insight", m:"통찰(력), 이해"}, {w:"instinct", m:"본능; 직감"},
        {w:"integrate", m:"통합시키다"}, {w:"intentionality", m:"고의성; 지향성"}, {w:"internal", m:"내적인, 내부의"}, {w:"interval", m:"(시간)간격, 구간"}, {w:"investigate", m:"조사하다, 살피다; 수사하다"},
        {w:"landfill", m:"(쓰레기)매립지"}, {w:"legal", m:"(합)법적인, 법률상의"}, {w:"leap", m:"뛰다, 뛰어오르다; 도약"}, {w:"maritime", m:"바다의, 해양의; 바다에 접한"}, {w:"massive", m:"거대한, 엄청나게 큰"},
        {w:"measure", m:"측정하다, 재다; 조치, 정책"}, {w:"merely", m:"단순히, 단지, 그저"}, {w:"modify", m:"수정하다, 변경하다"}, {w:"molecular", m:"분자의"}, {w:"neutral", m:"중립적인"},
        {w:"norm", m:"기준, 표준, 규범"}, {w:"object", m:"(~에)반대하다(to); 사물, 물체"}, {w:"offensive", m:"공격(의); 공격적인; 불쾌한"}, {w:"official", m:"공식적인, 공적인; 공무원, 관리"}, {w:"perceive", m:"감지하다, 인지하다"},
        {w:"pervasive", m:"만연한, (골고루)퍼지는, 스며드는"}, {w:"pesticide", m:"살충제; 농약"}, {w:"phenomenon", m:"현상"}, {w:"plain", m:"평범한, 단순한; 평원, 평지"}, {w:"planetary", m:"지구의, 행성의"},
        {w:"potential", m:"잠재적인, 가능성있는; 잠재력"}, {w:"predatory", m:"약탈하는; 포식성의"}, {w:"predominant", m:"우세한, 지배적인; 두드러진"}, {w:"principle", m:"원리, 원칙"}, {w:"procedural", m:"절차(상)의"},
        {w:"profession", m:"직업, 직종; 전문직"}, {w:"promising", m:"유망한, 촉망되는"}, {w:"proper", m:"적절한; 올바른"}, {w:"psychological", m:"심리(학)적인, 정신의"}, {w:"pursue", m:"추구하다, 계속하다"},
        {w:"rationale", m:"이유, 근거; 설명"}, {w:"reactivity", m:"반응도, 반응성"}, {w:"rebel", m:"반발하다, 저항하다; 반역자"}, {w:"regime", m:"정권, 체제; 제도"}, {w:"reign", m:"통치, 지배(하다)"},
        {w:"reinforce", m:"강화하다, 보강하다"}, {w:"relevant", m:"관련있는, 연관된; 적절한"}, {w:"remarkable", m:"놀랄 만한, 주목할 만한"}, {w:"repetition", m:"반복"}, {w:"requirement", m:"필요조건, 요건"},
        {w:"resource", m:"자원(을 제공하다)"}, {w:"separate", m:"분리된, (따로)떨어진; 분리하다"}, {w:"severe", m:"극심한, 심각한; 혹독한"}, {w:"signature", m:"서명, 표시, 기호; 특징"}, {w:"significant", m:"중요한, 의미 있는"},
        {w:"strive", m:"노력하다, 애쓰다, 분투하다"}, {w:"subjective", m:"주관적인, 주관의, 주체적인"}, {w:"supremacy", m:"우위, 우월(성); 패권"}, {w:"sustainable", m:"지속 가능한"}, {w:"temporal", m:"시간의; 현세의"},
        {w:"thrive", m:"번창하다, 번영하다, 성공하다"}, {w:"transaction", m:"거래, 매매; 업무, 처리"}, {w:"transfer", m:"옮기다, 이동하다; 이동, 이적"}, {w:"urban", m:"도시의, 도심의"}, {w:"utilize", m:"활용하다, 이용하다"}
    ];

    let currentList = [], currentIndex = 0, currentMode = '', isFlipped = false, isRevealed = false, currentStep = 1, maxStep = 1;

    // --- 전체 리스트 기능 ---
    function openListView() {
        showScreen('list');
        renderFullList(vocab);
    }

    function renderFullList(data) {
        const container = document.getElementById('voca-list-container');
        container.innerHTML = data.map(item => `
            <div class="voca-list-item">
                <span class="w">${item.w}</span>
                <span class="m">${item.m}</span>
            </div>
        `).join('');
    }

    function filterList() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const filtered = vocab.filter(item => 
            item.w.toLowerCase().includes(query) || item.m.includes(query)
        );
        renderFullList(filtered);
    }

    // --- PDF 다운로드 기능 ---
    async function downloadTestPaper() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const part = document.getElementById('target-part').value;
        const testData = vocab.slice(0, part * 10).sort(() => Math.random() - 0.5);
        doc.text(`VOCA MASTER TEST (Part 1~${part})`, 105, 20, { align: 'center' });
        doc.autoTable({
            head: [['No', 'Word', 'Meaning']],
            body: testData.map((item, i) => [i + 1, item.w, ""]),
            startY: 35,
            theme: 'grid',
            headStyles: { fillColor: [99, 102, 241] }
        });
        doc.save(`VocaTest_Part${part}.pdf`);
    }

    // --- 학습 로직 ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-screen').classList.add('active');
    }

    function startStrategy() {
        maxStep = parseInt(document.getElementById('target-part').value);
        currentMode = 'strategy'; currentStep = 1; loadStrategyData(); showScreen('action'); render();
    }

    function loadStrategyData() {
        let count = currentStep * 10;
        if(count > vocab.length) count = vocab.length;
        currentList = vocab.slice(0, count); currentIndex = 0;
        document.getElementById('mode-label').innerText = `누적 학습 (1~${currentStep})`;
    }

    function initMode(m) {
        currentMode = m; currentIndex = 0;
        currentList = (m === 'test') ? [...vocab].sort(() => Math.random() - 0.5) : [...vocab];
        showScreen('action');
        document.getElementById('mode-label').innerText = (m === 'test' ? '랜덤 테스트' : '순차 암기');
        document.getElementById('card-area').style.display = (m === 'test' ? 'none' : 'block');
        document.getElementById('test-area').style.display = (m === 'test' ? 'block' : 'none');
        render();
    }

    function render() {
        if(currentIndex >= currentList.length) {
            if(currentMode === 'strategy' && currentStep < maxStep) {
                alert(`Part ${currentStep} 완료! 범위를 넓힙니다.`);
                currentStep++; loadStrategyData(); render();
            } else { alert("학습 완료!"); location.reload(); }
            return;
        }
        const data = currentList[currentIndex];
        document.getElementById('cur-idx').innerText = currentIndex + 1;
        document.getElementById('total-idx').innerText = currentList.length;
        document.getElementById('progress-fill').style.width = ((currentIndex / currentList.length) * 100) + "%";
        
        if(currentMode === 'test') {
            isRevealed = false;
            document.getElementById('test-w').innerText = data.w;
            document.getElementById('test-ans').innerText = data.m;
            document.getElementById('test-ans').style.opacity = '0';
            document.getElementById('user-input').value = '';
        } else {
            isFlipped = false;
            document.getElementById('main-card').classList.remove('is-flipped');
            document.getElementById('front-w').innerText = data.w;
            document.getElementById('back-m').innerText = data.m;
            document.getElementById('action-btn').style.display = 'block';
            document.getElementById('study-controls').style.display = 'none';
        }
    }

    function handleNext() {
        if(currentMode === 'test') {
            if(!isRevealed) {
                document.getElementById('test-ans').style.opacity = '1';
                isRevealed = true;
            } else { nextWord(); }
        } else { flipCard(); }
    }

    function flipCard() {
        if(currentMode === 'test') return;
        isFlipped = !isFlipped;
        document.getElementById('main-card').classList.toggle('is-flipped');
        if(isFlipped) {
            document.getElementById('action-btn').style.display = 'none';
            document.getElementById('study-controls').style.display = 'grid';
        }
    }

    function nextWord() { currentIndex++; render(); }
</script>
</body>
</html>
